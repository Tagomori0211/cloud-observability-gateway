syntax = "proto3";

package shared;

option java_package = "app.generated";
option java_multiple_files = true;

// Single-source-of-truth gRPC service definition for Tagomori Status Platform.
// Kotlin stubs: generated by Gradle protobuf plugin at build time.
// Dart stubs:   generated by CI via protoc --dart_out=grpc:frontend/lib/src/generated/

service MetricsService {
  // Unary RPC: fetch current server metrics snapshot.
  rpc GetMetrics(GetMetricsRequest) returns (MetricsResponse);

  // Server-streaming RPC: push metrics updates.
  // Server must send keepalive frames at least every 90s (Cloudflare Tunnel idle timeout).
  rpc StreamMetrics(GetMetricsRequest) returns (stream MetricsResponse);
}

enum ServerType {
  JAVA    = 0;  // Survival (pod: minecraft, job: survival)
  BEDROCK = 1;  // Bedrock  (pod: bedrock,  job: bedrock)
}

message GetMetricsRequest {
  ServerType server = 1;
}

message MetricsResponse {
  bool   is_online      = 1;
  string server_name    = 2;
  string version        = 3;
  int32  players_online = 4;
  int32  players_max    = 5;
  repeated string player_list = 6;
  double latency_ms     = 7;   // mc-monitor server-list-ping latency
  int32  memory_used_mb = 8;
  int32  memory_max_mb  = 9;
  double cpu_usage      = 10;
  int64  uptime_seconds = 11;
}
