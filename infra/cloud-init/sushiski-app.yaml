#cloud-config
# ============================================================
# TAK Pipeline - Sushiski Status App GCE 初期セットアップ
# ============================================================
# 実行内容（初回起動時のみ）:
#   1. Docker / docker-compose-plugin インストール
#   2. Tailscale インストール + Secret Manager 経由で auth_key 取得 → up
#      hostname: gce-sushiski-app（gce-mc-monitoring に到達するため必須）
#   3. Secret Manager から sushiski-tunnel-token を取得 → ~/app/.env に書き込み
#   4. ~/app/{api,web}/ ディレクトリ作成（CI rsync の受け皿）
#
# 前提:
#   - VM の SA (mc-proxy-sa) に roles/secretmanager.secretAccessor 付与済み
#   - Secret Manager に以下の secret が登録済み:
#       tailscale-auth-key     （既存。mc-monitoring と共有）
#       sushiski-tunnel-token  （新規。Terraform で skeleton 作成後、手動で値を設定）
#   - GCE ファイアウォール: IAP SSH のみ（tcp:22 対外公開不要）
# ============================================================

package_update: true
package_upgrade: false

apt:
  sources:
    docker.list:
      source: "deb [arch=amd64 signed-by=$KEY_FILE] https://download.docker.com/linux/ubuntu noble stable"
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88
    tailscale.list:
      source: "deb [signed-by=$KEY_FILE] https://pkgs.tailscale.com/stable/ubuntu noble main"
      keyid: 2596A99EAAB33821893C0A79458CA832957F5868

packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - tailscale
  - git
  - jq
  - netcat-openbsd

write_files:
  - path: /etc/docker/daemon.json
    permissions: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": { "max-size": "10m", "max-file": "3" }
      }

  - path: /usr/local/bin/setup-swap.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e
      if [[ ! -f /swap.img ]]; then
        fallocate -l 1G /swap.img
        chmod 600 /swap.img
        mkswap /swap.img
        swapon /swap.img
        echo "/swap.img none swap sw 0 0" >> /etc/fstab
      fi

  # 既存 mc-proxy と同じパターン: Secret Manager → tailscale up
  - path: /usr/local/bin/tailscale-up.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      if tailscale status --peers=false --json 2>/dev/null | jq -e '.BackendState=="Running"' > /dev/null; then
        echo "[tailscale-up] 既に Running 状態のため skip"
        exit 0
      fi
      AUTH_KEY="$(gcloud secrets versions access latest --secret=tailscale-auth-key)"
      tailscale up \
        --auth-key="${AUTH_KEY}" \
        --hostname=gce-sushiski-app \
        --accept-routes \
        --ssh
      echo "[tailscale-up] Tailscale up 完了"

  # TUNNEL_TOKEN + VICTORIA_METRICS_URL を .env に書き込む。
  # VICTORIA_METRICS_URL: mc-monitoring-1 の VPC 内部 IP を gcloud で動的取得。
  # ファイアウォール tak-vpc-allow-vm-8428-from-sushiski が Terraform で適用済みの前提。
  - path: /usr/local/bin/fetch-sushiski-secrets.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      APP_DIR="/home/$(getent passwd 1000 | cut -d: -f1)/app"
      mkdir -p "${APP_DIR}"

      TOKEN="$(gcloud secrets versions access latest --secret=sushiski-tunnel-token)"
      VM_IP="$(gcloud compute instances describe mc-monitoring-1 \
        --zone=asia-northeast1-b \
        --format='get(networkInterfaces[0].networkIP)')"

      printf 'TUNNEL_TOKEN=%s\nVICTORIA_METRICS_URL=http://%s:8428\n' \
        "${TOKEN}" "${VM_IP}" > "${APP_DIR}/.env"
      chmod 600 "${APP_DIR}/.env"
      echo "[fetch-secrets] .env を更新しました (VM_IP=${VM_IP})"

runcmd:
  - /usr/local/bin/setup-swap.sh
  - systemctl restart docker
  - systemctl enable docker
  - systemctl enable --now tailscaled
  - /usr/local/bin/tailscale-up.sh
  # TUNNEL_TOKEN を .env に配置
  - /usr/local/bin/fetch-sushiski-secrets.sh
  # CI rsync の受け皿ディレクトリ
  - mkdir -p /home/$(getent passwd 1000 | cut -d: -f1)/app/{api,web}
  # 起動ログ
  - echo "sushiski-app bootstrap complete" > /var/log/sushiski-bootstrap.log
