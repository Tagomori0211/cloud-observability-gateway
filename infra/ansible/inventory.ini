# Ansible inventory — GCE A (sushiski-app) のみ。
# GCE B (mc-monitoring-1) は Minecraft-on-Kubenates リポジトリが管理。
#
# IP は Terraform 適用後に確認:
#   terraform -chdir=infra/terraform output sushiski_app_external_ip
#
# SSH 接続: IAP トンネル経由
#   ansible.cfg の ssh_args に IAP ProxyCommand を設定済み。
#   GCP IAP の送信元 IP 制限はファイアウォール tak-vpc-allow-iap-ssh-sushiski で管理。

[gce_a]
sushiski-app ansible_host=<SUSHISKI_APP_EXTERNAL_IP> ansible_user=<SSH_USER>
