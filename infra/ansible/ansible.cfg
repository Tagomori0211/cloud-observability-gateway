[defaults]
inventory       = inventory.ini
remote_user     = root
host_key_checking = False
stdout_callback = yaml

[ssh_connection]
# IAP トンネル経由 SSH: 既存インフラ (Minecraft-on-Kubenates) と同一アクセス方式
# gcloud CLI が PATH に必要。`gcloud auth application-default login` 実行済みであること。
ssh_args = -o StrictHostKeyChecking=no -o ProxyCommand='gcloud compute start-iap-tunnel %(host)s 22 --listen-on-stdin --project=<GCP_PROJECT_ID> --zone=asia-northeast1-b'
pipelining  = True
