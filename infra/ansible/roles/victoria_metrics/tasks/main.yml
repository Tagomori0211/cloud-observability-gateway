---
# Deploy VictoriaMetrics single-node on GCE B via Docker.
# Data is persisted to /opt/victoria-metrics-data (survives container restarts).
# Listens on :8428 — accessible from GCE A via VPC-internal IP only.

- name: Create VictoriaMetrics data directory
  file:
    path: /opt/victoria-metrics-data
    state: directory
    mode: "0755"

- name: Create VictoriaMetrics systemd unit (via docker run)
  copy:
    dest: /etc/systemd/system/victoria-metrics.service
    content: |
      [Unit]
      Description=VictoriaMetrics
      After=docker.service
      Requires=docker.service

      [Service]
      Restart=always
      ExecStartPre=-/usr/bin/docker rm -f victoria-metrics
      ExecStart=/usr/bin/docker run --rm \
        --name victoria-metrics \
        -p 127.0.0.1:8428:8428 \
        -v /opt/victoria-metrics-data:/storage \
        victoriametrics/victoria-metrics:stable \
        -storageDataPath=/storage \
        -retentionPeriod=90d
      ExecStop=/usr/bin/docker stop victoria-metrics

      [Install]
      WantedBy=multi-user.target
    mode: "0644"

- name: Reload systemd and enable VictoriaMetrics
  systemd:
    daemon_reload: true
    name: victoria-metrics
    enabled: true
    state: started

- name: Expose VictoriaMetrics on all VPC interfaces (not loopback)
  # The service above binds to 127.0.0.1 for safety.
  # Override to the VPC interface so GCE A can reach it.
  lineinfile:
    path: /etc/systemd/system/victoria-metrics.service
    regexp: "p 127.0.0.1:8428:8428"
    line: "        -p 0.0.0.0:8428:8428 \\"
  notify: Restart victoria-metrics

handlers:
  - name: Restart victoria-metrics
    systemd:
      name: victoria-metrics
      state: restarted
      daemon_reload: true
