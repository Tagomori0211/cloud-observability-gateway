---
# Tailscale インストール + Secret Manager 経由での起動。
# 既存 mc-proxy-1 と同一パターン (Minecraft-on-Kubenates/gce/cloud-init.yaml 参照)。
# hostname: gce-sushiski-app → gce-mc-monitoring:8428 (VictoriaMetrics) に到達するため必須。

- name: Add Tailscale apt key
  shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg \
      | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Add Tailscale apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
    state: present
    filename: tailscale

- name: Install Tailscale
  apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if Tailscale is already connected
  command: tailscale status --peers=false --json
  register: ts_status
  changed_when: false
  failed_when: false

- name: Get Tailscale auth key from Secret Manager
  command: gcloud secrets versions access latest --secret=tailscale-auth-key
  register: ts_auth_key
  no_log: true
  when: >
    ts_status.rc != 0 or
    (ts_status.stdout | from_json).BackendState != 'Running'

- name: Connect Tailscale (hostname gce-sushiski-app)
  command: >
    tailscale up
    --auth-key={{ ts_auth_key.stdout }}
    --hostname=gce-sushiski-app
    --accept-routes
    --ssh
  no_log: true
  when: ts_auth_key is not skipped

- name: Verify Tailscale can reach gce-mc-monitoring
  command: tailscale ping gce-mc-monitoring
  register: ts_ping
  changed_when: false
  failed_when: false
  # 到達不能でも失敗扱いにしない（GCE B が停止している可能性）
