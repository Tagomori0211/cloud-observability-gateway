# Runtime stack on APP-instance (tagomori-app): cloudflared + Envoy + Ktor + MariaDB
# + metrics export (node-exporter + vmagent).
#
# Prerequisites (manual, one-time):
#   - Cloudflare Zero Trust: create Tunnel, TUNNEL_TOKEN を Secret Manager
#     (tagomori-tunnel-token) に登録 → cloud-init が ~/app/.env に展開
#   - CF Public Hostname: app.tagomori.dev → http://envoy:80
#   - tagomori-app に Tailscale 導入済み（cloud-init で自動実施）
#     → gce-mc-monitoring:8428 に到達可能であること
#
# TUNNEL_TOKEN は ~/app/.env から自動ロードされる（compose v2 の env_file デフォルト動作）。
# GCE ファイアウォール: IAP SSH (tcp:22) のみ。80/443/50051 の外部公開不要。
#
# NOTE: networks: internal: true を追加しないこと。
#   cloudflared のアウトバウンド接続と Tailscale 経由の GCE B 通信が両方塞がる。

services:
  # ---- Cloudflare Tunnel — sole external ingress ----
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: app-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - envoy
    restart: unless-stopped

  # ---- gRPC-Web conversion + routing ----
  envoy:
    image: envoyproxy/envoy:v1.31.5
    container_name: app-envoy
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - api
    restart: unless-stopped
    # No ports: only reachable from cloudflared inside compose network.

  # ---- Kotlin (Ktor static + grpc-kotlin) ----
  api:
    build:
      context: ./api    # CI places app.jar + Dockerfile here
    container_name: app-api
    environment:
      # mc-monitoring-1 の VPC 内部 IP (10.100.0.x) 経由で到達。
      # ファイアウォール: tak-vpc-allow-vm-8428-from-tagomori (tagomori → minecraft タグ)
      # 値は ~/app/.env の VICTORIA_METRICS_URL から自動ロード。
      # 設定元: cloud-init / Ansible が gcloud で mc-monitoring-1 の内部 IP を動的取得。
      VICTORIA_METRICS_URL: ${VICTORIA_METRICS_URL}
      DB_URL: ${DB_URL:-jdbc:mariadb://mariadb:3306/tagomori_status}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-tagomori_internal_db_pass}
      # projects/{project}/topics/{topic} 形式で設定。未設定時は publish をスキップ。
      PUBSUB_TOPIC: ${PUBSUB_TOPIC:-}
    volumes:
      # Flutter Web assets: rsync で更新、イメージ再ビルド不要。
      - ./web:/app/web:ro
    depends_on:
      - mariadb
    restart: unless-stopped
    # No ports: 8080 and 50051 are compose-network-internal only.

  mariadb:
    image: mariadb:11.4
    container_name: app-mariadb
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tagomori_status}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-tagomori_internal_db_pass}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-tagomori_internal_root_pass}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # ports は定義しない（compose ネットワーク内のみ）

  # ---- ホストメトリクス収集（CPU/メモリ/ディスク/ネットワーク） ----
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: app-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          propagation: rslave
    restart: unless-stopped
    # ports は定義しない（vmagent が compose ネットワーク内で :9100 をスクレイプ）

  # ---- メトリクスエクスポーター：自己メトリクスを VictoriaMetrics へ remote_write ----
  # 送信先 mc-monitoring-1:8428 へは VPC 内部経由で到達。
  # ファイアウォール: tak-vpc-allow-vm-8428-from-tagomori (tagomori → minecraft タグ)。
  # VICTORIA_METRICS_URL は ~/app/.env から自動ロード（api サービスと共用）。
  vmagent:
    image: victoriametrics/vmagent:v1.103.0
    container_name: app-vmagent
    command:
      - "-promscrape.config=/etc/vmagent/scrape.yml"
      - "-remoteWrite.url=${VICTORIA_METRICS_URL}/api/v1/write"
      - "-remoteWrite.tmpDataPath=/vmagentdata"
    volumes:
      - ./vmagent-scrape.yml:/etc/vmagent/scrape.yml:ro
      - vmagent-data:/vmagentdata
    depends_on:
      - node-exporter
    restart: unless-stopped
    # No ports: scrape/remote-write のみ。外部公開不要。

volumes:
  mariadb-data:
  vmagent-data:
