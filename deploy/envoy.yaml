# Envoy proxy: gRPC-Web conversion and path-based routing.
#
# Routing rules:
#   /shared.*  → api:50051  (gRPC-Web → raw gRPC, h2c)
#   /*         → api:8080   (Ktor static / Flutter SPA)
#
# TLS is terminated at the Cloudflare edge.
# Envoy listens on plain HTTP :80 and is only reachable from cloudflared.
#
# IMPORTANT: Do not remove `timeout: 0s` on the gRPC route — the default
# 15-second timeout kills streaming RPCs. CF Tunnel itself cuts idle
# connections at ~100s; SharedServiceImpl.streamMetrics sends keepalives
# every 15s to stay under that limit.

static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address: { address: 0.0.0.0, port_value: 80 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                use_remote_address: true
                route_config:
                  name: app_routes
                  virtual_hosts:
                    - name: app
                      domains: ["*"]
                      # Same-origin deployment: CORS is not triggered.
                      # This policy is a precaution for future domain splits.
                      typed_per_filter_config:
                        envoy.filters.http.cors:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                          allow_origin_string_match:
                            - exact: "https://app.tagomori.dev"
                          allow_methods: "GET, POST, OPTIONS"
                          allow_headers: "keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,x-grpc-web,grpc-timeout,authorization"
                          expose_headers: "grpc-status,grpc-message"
                          max_age: "1728000"
                      routes:
                        # gRPC-Web → Ktor gRPC (:50051)
                        # Path format: /shared.<ServiceName>/<MethodName>
                        - match: { prefix: "/shared." }
                          route:
                            cluster: grpc_backend
                            timeout: 0s
                            max_stream_duration:
                              grpc_timeout_header_max: 0s
                        # Static files / Flutter SPA → Ktor (:8080)
                        - match: { prefix: "/" }
                          route: { cluster: ktor_static }
                http_filters:
                  # Order matters: grpc_web → cors → router
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # gRPC backend — HTTP/2 (h2c plain text to api container)
    - name: grpc_backend
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: grpc_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api, port_value: 50051 }

    # Ktor static file server — HTTP/1.1
    - name: ktor_static
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: ktor_static
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api, port_value: 8080 }
