# CI/CD: main push → (optional infra) → proto gen → Kotlin/Flutter build → GCE A deploy
#
# 接続方式: gcloud compute ssh --tunnel-through-iap
#   既存インフラ (Minecraft-on-Kubenates) に合わせ、IAP 経由のみ。
#   公開ポート (tcp:22/80/443) は一切不要。
#
# Required GitHub Secrets:
#   GCP_WIF_PROVIDER  : Workload Identity Provider リソース名
#                       `terraform output -raw workload_identity_provider` で取得
#   GCP_SERVICE_ACCOUNT: tagomori-ci-sa のメールアドレス
#                       `terraform output -raw ci_service_account` で取得
#   GCP_PROJECT_ID   : GCP プロジェクト ID
#   GCE_ZONE         : asia-northeast1-b
#   GCE_SSH_USER     : VM への OS Login ユーザー名
#                      (SA メールの @ 前部分: sa_<数字>_<hex>)
#                      `gcloud compute os-login describe-profile --project=...` で確認
#   DB_PASSWORD      : MariaDB の app ユーザーのパスワード（ADR-account-linking 用）。
#                      api コンテナ(DB_PASSWORD)と mariadb コンテナ(MARIADB_PASSWORD)の
#                      双方に同じ値を書き込む。未設定の場合は docker-compose.yml の
#                      デフォルト値が両コンテナで一致した状態のまま使われる。
#
# Optional (Terraform job):
#   TF_VAR_PROJECT_ID: var.project_id に渡す値 (= GCP_PROJECT_ID と同一で可)

name: Deploy to GCE

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCE_INSTANCE: tagomori-app
  DEPLOY_DIR: ~/app
  FLUTTER_VERSION: '3.44.2'

jobs:
  # ---- Optional: Terraform で infra/terraform/** 変更時のみ実行 ----
  infra:
    runs-on: self-hosted
    timeout-minutes: 15
    if: |
      contains(toJSON(github.event.commits.*.modified), 'infra/terraform') ||
      contains(toJSON(github.event.commits.*.added),    'infra/terraform')

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Write terraform.tfvars
        run: |
          cat > infra/terraform/terraform.tfvars <<EOF
          project_id = "${{ secrets.GCP_PROJECT_ID }}"
          EOF

      - run: terraform -chdir=infra/terraform init
      - run: terraform -chdir=infra/terraform plan  -out=tfplan
      - run: terraform -chdir=infra/terraform apply -auto-approve tfplan

  # ---- Build and deploy application ----
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        # python3-numpy: IAP トンネルの転送帯域を上げる（gcloud の警告対応）
        run: sudo apt-get install -y unzip curl git jq xz-utils python3-numpy

      # ---- Dart stubs (Kotlin は Gradle が自動生成) ----
      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # self-hosted ランナーのローカルディスクに Flutter を永続キャッシュ。
      # actions/cache と違い GitHub キャッシュサービスへの転送が不要なので、
      # 2回目以降は 5 秒以内で完了する。バージョンを変えるまで再ダウンロード不要。
      - name: Setup Flutter (runner-local cache)
        run: |
          FLUTTER_DIR="$HOME/.flutter-sdk/$FLUTTER_VERSION"
          if [ ! -f "$FLUTTER_DIR/bin/flutter" ]; then
            echo "Flutter $FLUTTER_VERSION not found — installing..."
            mkdir -p "$(dirname "$FLUTTER_DIR")"
            git clone --depth 1 -b "$FLUTTER_VERSION" \
              https://github.com/flutter/flutter.git "$FLUTTER_DIR"
          else
            echo "Flutter $FLUTTER_VERSION found in runner cache."
          fi
          echo "$FLUTTER_DIR/bin" >> "$GITHUB_PATH"

      - name: Generate Dart stubs from shared.proto
        run: |
          # 21.1.2: protobuf ^3.x 互換。25.x は ^4.x 用で pubspec と不一致になる。
          dart pub global activate protoc_plugin 21.1.2
          export PATH="$PATH:$HOME/.pub-cache/bin"
          mkdir -p frontend/lib/src/generated
          protoc \
            --proto_path=. \
            --dart_out=grpc:frontend/lib/src/generated \
            shared.proto

      # ---- Backend ----
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build fat JAR
        working-directory: backend
        run: ./gradlew --no-daemon shadowJar

      # ---- Frontend ----
      # --web-renderer は Flutter 3.29 で削除済み。付けないこと。
      - name: Build Flutter Web
        working-directory: frontend
        run: |
          flutter pub get
          flutter build web --release

      # ---- Bundle ----
      - name: Assemble deploy bundle
        run: |
          mkdir -p bundle/api bundle/web
          cp backend/build/libs/*.jar  bundle/api/app.jar
          cp deploy/Dockerfile.api         bundle/api/Dockerfile
          cp -r frontend/build/web/.       bundle/web/
          cp deploy/docker-compose.yml     bundle/
          cp deploy/envoy.yaml             bundle/

      # ---- GCP 認証 (IAP SSH に必要) ----
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # ---- ファイル転送 (gcloud compute scp + IAP) ----
      # 多数の小ファイルを個別 scp すると IAP トンネルのオーバーヘッドで激遅になるため、
      # tar 1 ファイルに固めて転送 → VM 側で展開する（接続も 2 回で済む）。
      - name: Transfer bundle to GCE A via IAP
        env:
          ZONE: ${{ secrets.GCE_ZONE }}
          SSH_USER: ${{ secrets.GCE_SSH_USER }}
        run: |
          tar -C bundle -czf bundle.tar.gz .

          gcloud compute scp \
            bundle.tar.gz \
            "${SSH_USER}@${GCE_INSTANCE}:/tmp/bundle.tar.gz" \
            --zone="${ZONE}" --tunnel-through-iap

          # 既存アセットを削除（.env は保護）→ 展開
          gcloud compute ssh "${SSH_USER}@${GCE_INSTANCE}" \
            --zone="${ZONE}" \
            --tunnel-through-iap \
            --command="find ${DEPLOY_DIR} -mindepth 1 -not -name '.env' -delete 2>/dev/null; mkdir -p ${DEPLOY_DIR} && tar -xzf /tmp/bundle.tar.gz -C ${DEPLOY_DIR} && rm /tmp/bundle.tar.gz"

      # ---- コンテナ再構築 (IAP SSH) ----
      # down → up で全コンテナを確実に入れ替える。
      - name: Rebuild containers on GCE A via IAP
        env:
          ZONE: ${{ secrets.GCE_ZONE }}
          SSH_USER: ${{ secrets.GCE_SSH_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          gcloud compute ssh "${SSH_USER}@${GCE_INSTANCE}" \
            --zone="${ZONE}" \
            --tunnel-through-iap \
            --command="
              set -euo pipefail
              cd ${DEPLOY_DIR}
              touch .env
              chmod 600 .env

              if ! grep -q '^TUNNEL_TOKEN=' .env; then
                TOKEN=\$(gcloud secrets versions access latest --secret=tagomori-tunnel-token)
                printf 'TUNNEL_TOKEN=%s\n' \"\$TOKEN\" >> .env
              fi
              if ! grep -q '^VICTORIA_METRICS_URL=' .env; then
                printf 'VICTORIA_METRICS_URL=http://10.100.0.13:8428\n' >> .env
              fi

              set_env_kv() {
                key=\"\$1\"; val=\"\$2\"
                [ -z \"\$val\" ] && return 0
                if grep -q \"^\${key}=\" .env; then
                  sed -i \"s|^\${key}=.*|\${key}=\${val}|\" .env
                else
                  printf '%s=%s\n' \"\$key\" \"\$val\" >> .env
                fi
              }
              # DB_PASSWORD (api 接続用) と MARIADB_PASSWORD (mariadb 側ユーザー作成用) は
              # 同じ値でなければ認証が通らないため、同一の GitHub Secret から両方に書き込む。
              set_env_kv DB_USER 'app'
              set_env_kv DB_PASSWORD '${DB_PASSWORD}'
              set_env_kv MARIADB_DATABASE 'tagomori_status'
              set_env_kv MARIADB_USER 'app'
              set_env_kv MARIADB_PASSWORD '${DB_PASSWORD}'

              echo '>>> docker compose down'
              docker compose down --remove-orphans
              echo '>>> docker compose up'
              docker compose up -d --build
              docker image prune -f
            "

      # ---- Cloudflare キャッシュパージ (オプション) ----
      # CF_API_TOKEN / CF_ZONE_ID を GitHub Secrets に設定すると有効になる。
      # 設定方法:
      #   CF_ZONE_ID    : Cloudflare Dashboard → ドメイン Overview → Zone ID
      #   CF_API_TOKEN  : My Profile → API Tokens → "Zone:Cache Purge" 権限のみ付与
      # 未設定の場合はこのステップをスキップする (if 条件で評価)。
      - name: Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "${CF_API_TOKEN}" ]; then
            echo 'CF_API_TOKEN not set — skipping cache purge'
            exit 0
          fi
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            && echo 'Cloudflare cache purged.' \
            || echo 'CF purge failed (non-fatal)'

      # ---- 起動確認 + ログ取得 ----
      # コンテナが安定するまで 15 秒待ってからログを取得する。
      # app.tagomori.dev への HTTP チェックも合わせて実施。
      - name: Verify deployment on GCE A via IAP
        env:
          ZONE: ${{ secrets.GCE_ZONE }}
          SSH_USER: ${{ secrets.GCE_SSH_USER }}
        run: |
          sleep 15
          gcloud compute ssh "${SSH_USER}@${GCE_INSTANCE}" \
            --zone="${ZONE}" \
            --tunnel-through-iap \
            --command="
              set -euo pipefail
              cd ${DEPLOY_DIR}
              echo '========== container status =========='
              docker compose ps
              echo '========== api logs (last 40) =========='
              docker compose logs --no-color --tail=40 api
              echo '========== envoy logs (last 20) =========='
              docker compose logs --no-color --tail=20 envoy
              echo '========== cloudflared logs (last 20) =========='
              docker compose logs --no-color --tail=20 cloudflared
              echo '========== HTTP check =========='
              curl -sfo /dev/null -w 'HTTP %{http_code}  %{time_total}s  %{url_effective}\n' \
                https://app.tagomori.dev/ || echo 'curl failed (exit '\$?')'
            "
